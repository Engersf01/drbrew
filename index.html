<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>dr.breW — just what the doctor ordered</title>
  <meta name="description" content="dr.breW — just what the doctor ordered. Powered by DLAB." />
  <meta name="theme-color" content="#ffffff" />

  <!-- Open Graph -->
  <meta property="og:title" content="dr.breW" />
  <meta property="og:description" content="just what the doctor ordered" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://drbrew.beer/" />
  <meta property="og:image" content="https://drbrew.beer/logo.png" />

  <link rel="icon" href="data:image/svg+xml,&lt;svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'&gt;&lt;text y='.9em' font-size='90' font-weight='900' font-family='Georgia,serif'&gt;W&lt;/text&gt;&lt;/svg&gt;" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="stage">
    <img class="logo" src="logo.png" alt="dr.breW — just what the doctor ordered, powered by DLAB" />

    <button class="watch-btn" id="watchBtn" type="button" aria-haspopup="dialog">
      <span class="play-icon" aria-hidden="true">▶</span>
      Watch the film
    </button>
  </main>

  <footer class="footer">
    <a href="mailto:hello@drbrew.beer">hello@drbrew.beer</a>
    <span class="dot">·</span>
    <span>&copy; <span id="year"></span> dr.breW</span>
  </footer>

  <!-- Video modal -->
  <div class="modal" id="videoModal" role="dialog" aria-modal="true" aria-label="dr.breW film" hidden>
    <div class="modal-backdrop" data-close></div>
    <div class="modal-body">
      <button class="modal-close" id="closeBtn" type="button" aria-label="Close video">&times;</button>
      <video id="filmPlayer" controls playsinline preload="metadata" poster="logo.png">
        <source src="drbrew-lab.mp4" type="video/mp4" />
        Your browser does not support the video tag.
      </video>
    </div>
  </div>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();

    const modal = document.getElementById('videoModal');
    const player = document.getElementById('filmPlayer');
    const watchBtn = document.getElementById('watchBtn');
    const closeBtn = document.getElementById('closeBtn');

    function openModal() {
      modal.hidden = false;
      document.body.classList.add('no-scroll');
      // play once visible
      player.currentTime = 0;
      const p = player.play();
      if (p && p.catch) p.catch(function () {});
      closeBtn.focus();
    }

    function closeModal() {
      player.pause();
      modal.hidden = true;
      document.body.classList.remove('no-scroll');
      watchBtn.focus();
    }

    watchBtn.addEventListener('click', openModal);
    closeBtn.addEventListener('click', closeModal);
    modal.addEventListener('click', function (e) {
      if (e.target.hasAttribute('data-close')) closeModal();
    });
    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape' && !modal.hidden) closeModal();
    });
  </script>
</body>
</html>
