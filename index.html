<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>dr.breW — just what the doctor ordered</title>
  <meta name="description" content="dr.breW — just what the doctor ordered. Powered by DLAB." />
  <meta name="theme-color" content="#ffffff" />

  <!-- Open Graph -->
  <meta property="og:title" content="dr.breW" />
  <meta property="og:description" content="just what the doctor ordered" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://drbrew.beer/" />
  <meta property="og:image" content="https://drbrew.beer/logo.png" />

  <link rel="icon" href="data:image/svg+xml,&lt;svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'&gt;&lt;text y='.9em' font-size='90' font-weight='900' font-family='Georgia,serif'&gt;W&lt;/text&gt;&lt;/svg&gt;" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Fullscreen film behind the doors -->
  <div class="video-stage">
    <video id="filmPlayer" playsinline preload="auto" controls>
      <source src="drbrew-lab.mp4" type="video/mp4" />
      Your browser does not support the video tag.
    </video>
  </div>

  <!-- The landing "doors" — split down the middle, swing open on start -->
  <div class="curtain" id="curtain">
    <div class="door left">
      <div class="face">
        <img class="logo" src="logo.png" alt="dr.breW — just what the doctor ordered, powered by DLAB" />
        <span class="start-btn placeholder" aria-hidden="true"><span class="play-icon">▶</span> Click To Start</span>
      </div>
    </div>
    <div class="door right">
      <div class="face">
        <img class="logo" src="logo.png" alt="" aria-hidden="true" />
        <span class="start-btn placeholder" aria-hidden="true"><span class="play-icon">▶</span> Click To Start</span>
      </div>
    </div>
  </div>

  <!-- Real, single clickable button aligned over the doors -->
  <div class="start-layer" id="startLayer">
    <div class="logo-box" aria-hidden="true"></div>
    <button class="start-btn" id="startBtn" type="button">
      <span class="play-icon" aria-hidden="true">▶</span> Click To Start
    </button>
  </div>

  <footer class="footer">
    <span>&copy; 2020 - 2026 dr.breW</span>
  </footer>

  <script>
    const curtain = document.getElementById('curtain');
    const startBtn = document.getElementById('startBtn');
    const player = document.getElementById('filmPlayer');

    let opened = false;
    function start() {
      if (opened) return;
      opened = true;

      document.body.classList.add('started'); // fades button + footer
      curtain.classList.add('open');          // swings the doors

      // play the film full-screen (click is a user gesture, so audio is allowed)
      player.currentTime = 0;
      const p = player.play();
      if (p && p.catch) p.catch(function () {});

      // once the doors have swung away, let them go so the film is fully interactive
      setTimeout(function () {
        curtain.classList.add('gone');
      }, 1250);
    }

    startBtn.addEventListener('click', start);
  </script>
</body>
</html>
